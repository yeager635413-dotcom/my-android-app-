name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Unzip project files
      run: |
        sudo apt-get install -y unzip
        unzip "document-vault (1).zip" -d extracted_project
        # Move everything to the main folder so gradle can find it
        mv extracted_project/*/* . 2>/dev/null || mv extracted_project/* . 2>/dev/null || true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc-vault-app
        path: "**/build/outputs/apk/debug/app-debug.apk"



