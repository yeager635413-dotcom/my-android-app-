name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Unzip project files
      run: |
        sudo apt-get install -y unzip
        unzip -o "document-vault (1).zip" -d extracted_project

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Find Gradlew and Build APK
      run: |
        # Search the directory structure to locate where gradlew unzipped
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew file could not be found anywhere in the unzipped files."
          exit 1
        fi
        
        # Get the directory containing gradlew
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        echo "Found gradlew in directory: $GRADLE_DIR"
        
        # Move into that directory, grant permissions, and build
        cd "$GRADLE_DIR"
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc-vault-app
        path: "**/build/outputs/apk/debug/app-debug.apk"





