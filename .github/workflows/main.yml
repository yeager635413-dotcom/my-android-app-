name: Build Android APK

on:
  push:
    branches:
      - main  # Change this to 'master' if your branch is named master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        # Removed the gradle cache setting to prevent the matching error

    - name: Grant execute permission for gradlew
      run: |
        if [ -f ./gradlew ]; then
          chmod +x ./gradlew
        elif [ -f ./*/gradlew ]; then
          chmod +x ./*/gradlew
        fi

    - name: Build with Gradle
      run: |
        if [ -f ./gradlew ]; then
          ./gradlew assembleDebug
        else
          cd * && ./gradlew assembleDebug
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc-vault-app
        path: "**/build/outputs/apk/debug/app-debug.apk"


