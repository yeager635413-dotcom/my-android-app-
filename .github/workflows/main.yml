name: Build Android APK From Zip
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip and Locate Project
        run: |
          unzip *.zip
          GRADLE_BUILD_DIR=$(find . -name "build.gradle*" -exec dirname {} \;)
          PROJ_DIR=$(echo "$GRADLE_BUILD_DIR" | tr ' ' '\n' | grep -v "/app$" | head -n 1)
          
          if [ -z "$PROJ_DIR" ]; then
            echo "Could not find project folder. Extracting to root."
          else
            echo "Project files found in $PROJ_DIR. Moving to root..."
            cp -r $PROJ_DIR/* . || true
            cp -r $PROJ_DIR/.* . || true
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Gradle and Generate Version 9 Wrapper
        run: |
          sudo apt-get update && sudo apt-get install -y gradle
          gradle wrapper --gradle-version 9.3.1
          chmod +x ./gradlew

      - name: Generate Auto Debug Keystore
        run: |
          # Generate a standard Android debug keystore file so the build can finish signing
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        
      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/debug/*.apk"




